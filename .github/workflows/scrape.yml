name: Scrape CIAN Leads

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install cianparser requests

      - name: Test API connectivity
        run: |
          curl -X POST $API_URL \
            -H "Content-Type: application/json" \
            -d '[{"address":"GH Action test","price":123}]'
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Run scraper
        run: python scripts/scrape_and_post.py
        env:
          API_URL: ${{ secrets.API_URL }}